machine:
  name: alderaan
  cores_per_node: 6
  scheduler: None
  module_path: /Users/mathomp4/modulefiles/Core
  git_https: True

test:
  #esmf_branch: [develop]
  esmf_branch: [feature/darwin-work]
  nuopc_branch: [develop]

matrix:
  llvm:
    versions:
      22.1:
        extra_commands:
          - "export PATH=/home/mathomp4/.homebrew/brew/bin:$PATH"
        compiler: appleclang-flang/22
        netcdf: None
        mpi:
          openmpi:
            module: openmpi/5.0.10
            bopt: [g]
        extra_env_vars:
          - ESMF_TRACE_LIB_BUILD=OFF
          - ESMPY_DATA_DIR="/Users/mathomp4/ESMF_Testing/esmf-test-data/grids"
          - FC="/Users/mathomp4/.homebrew/brew/bin/flang-22"
          - OpenMP_ROOT="/Users/mathomp4/.homebrew/brew/opt/libomp"

